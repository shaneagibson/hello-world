name: OWASP Dependency Check

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'build.gradle.kts'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'build.gradle.kts'
  schedule:
    - cron: '0 3 * * *'

env:
  GRADLE_OPTS: "--enable-native-access=ALL-UNNAMED"

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Cache OWASP NVD data
      uses: actions/cache@v4
      with:
        path: ~/.gradle/dependency-check-data
        key: dependency-check-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          dependency-check-${{ runner.os }}-

    - name: OWASP dependency scan
      run: ./gradlew dependencyCheckAnalyze
      env:
        NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

    - name: Upload OWASP report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: dependency-check-report
        path: build/reports/dependency-check-report.*
        retention-days: 30

    - name: Upload OWASP SARIF
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: build/reports/dependency-check-report.sarif
        category: dependency-check
