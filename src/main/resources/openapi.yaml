openapi: "3.0.3"
info:
  title: Hello World API
  description: A simple Spring Boot REST API
  version: "0.0.1-SNAPSHOT"
  contact:
    name: API Support
paths:
  /version:
    get:
      tags:
        - Version
      summary: Get application version
      description: Returns the current version of the application
      operationId: version
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
  /hello/world:
    get:
      tags:
        - Hello
      summary: Get Hello World message
      description: Returns a simple greeting message
      operationId: helloWorld
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HelloResponse"
components:
  schemas:
    VersionResponse:
      description: Application version response
      type: object
      required:
        - version
      properties:
        version:
          type: string
          description: Application version in the format 1.0.{git-hash}
          example: "1.0.abc1234"
    HelloResponse:
      description: Hello World response
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Greeting message
          example: "Hello, World!"
